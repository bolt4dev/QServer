name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build QServer.sln -c Release

      - name: Test
        run: dotnet test src/QServer.Tests/QServer.Tests.csproj -c Release

      - name: Pipeline smoke test
        run: dotnet run --project src/QServer/QServer.csproj -c Release -- --synthetic
